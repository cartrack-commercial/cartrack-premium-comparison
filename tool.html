      [b.entity, b.si ? 'Sum insured ' + b.si : '', opts.length + ' Cartrack options compared'].filter(Boolean).join(' · ')),
    el('div', { class: 'rscroll' },
      el('table', { class: 'rtable' },
        el('thead', {}, el('tr', {},
          el('th', {}, 'Cover section'),
          el('th', { class: 'r' }, 'Current R/m'),
          ...opts.map(q => el('th', { class: 'opt r' + ((q.optionId || q.id) === recId ? ' rec' : '') },
            el('span', { class: 'oi' }, optInsurer(q), (q.optionId || q.id) === recId ? el('span', { class: 'recbadge' }, 'Best value') : null),
            'R/m')))),
        el('tbody', {},
          rows.map(r => el('tr', {},
            el('td', {}, r.sec.label || '—'),
            el('td', { class: 'r' }, r.curL ? (r.curL.cur == null ? (r.curL.curStr || (r.curL.curIncl ? 'Included' : '—')) : r.curL.curIncl ? 'Included' : fmtR(r.curL.cur)) : '—'),
            ...r.cells.map(l => {
              const isBest = l && !l.propNq && !l.propIncl && l.prop != null && l.prop === r.best && opts.length > 1;
              const isGap = r.anyQuoted && (!l || l.propNq);
              return propCell(l, isBest, isGap);
            }))),
          el('tr', { class: 'tot' },
            el('td', {}, 'Total / month'),
            el('td', { class: 'r' }, fmtR(curTotal)),
            ...totals.map((t, i) => el('td', { class: 'r' + (t.prop === bestTotal ? ' best' : '') },
              fmtR(t.prop),
              el('span', { class: 'savechip ' + (t.prop - curTotal < 0 ? 'rneg' : t.prop - curTotal > 0 ? 'rpos' : '') },
                curTotal ? (t.prop - curTotal < 0 ? '− ' + fmtR(Math.abs(t.prop - curTotal) * 12).replace('R ', 'R ') + '/yr' : t.prop - curTotal > 0 ? '+ ' + fmtR((t.prop - curTotal) * 12).replace('R ', 'R ') + '/yr' : 'like-for-like') : ''))))))),
    el('div', { style: 'font-size:10px;color:var(--ink-500);margin-top:4px' },
      '✓ = lowest premium for that section. Red = option did not quote a section the others cover.'),
  );
}

function reportBuilding(b) {
  const opts = optionQuotes(b);
  if (opts.length > 1) return reportBuildingMulti(b, opts, optionPortfolio().recId);
  const q = selQuote(b);
  if (!q || !q.lines.length) return null;
  const t = quoteTotals(q);
  const adv = (q.advisories || '').split('\n').map(s => s.trim()).filter(Boolean);
  return el('div', {},
    el('h3', {}, b.name + (b.addr ? ' — ' + b.addr : '')),
    b.entity || b.si ? el('div', { style: 'font-size:11px;color:var(--ink-500)' },
      [b.entity, b.si ? 'Sum insured ' + b.si : '', 'Proposed: ' + (q.insurer || 'Cartrack') + (q.quoteNo ? ' · ' + q.quoteNo : '')]
        .filter(Boolean).join(' · ')) : null,
    el('table', { class: 'rtable' },
      el('thead', {}, el('tr', {},
        el('th', {}, 'Cover section'), el('th', {}, 'Current limit'), el('th', { class: 'r' }, 'Current R/m'),
        el('th', {}, 'Proposed limit'), el('th', { class: 'r' }, 'Proposed R/m'), el('th', { class: 'r' }, 'Δ / month'), el('th', {}, 'Status'))),
      el('tbody', {},
        q.lines.map(l => {
          const { delta, st } = lineStatus(l);
          const flags = lineFlags(l);
          return el('tr', {},
            el('td', {}, l.s || '—',
              flags.length ? el('div', { style: 'font-size:9.5px;color:var(--red-700);font-weight:600;margin-top:1px' },
                flags.map(f => f.text).join(' · ')) : null),
            el('td', {}, l.curL || (l.curIncl ? 'Included' : l.curStr || '—')),
            el('td', { class: 'r' }, l.cur == null ? (l.curStr || '—') : (l.curIncl ? 'Included' : fmtR(l.cur))),
            el('td', {}, l.propNq ? '—' : l.propL || (l.propIncl ? 'Included' : l.propStr || '—')),
            el('td', { class: 'r' }, l.propNq ? 'Not quoted' : l.prop == null ? (l.propStr || 'Not quoted') : (l.propIncl ? 'Included' : fmtR(l.prop))),
            el('td', { class: 'r ' + (delta == null ? '' : delta < 0 ? 'rneg' : delta > 0 ? 'rpos' : '') },
              delta == null ? '—' : fmtR(delta, true)),
            el('td', {}, st === 'gap' ? 'Not covered' : st === 'added' ? 'Now covered' : st[0].toUpperCase()+st.slice(1)));
        }),
        el('tr', { class: 'tot' },
          el('td', {}, 'Total'), el('td', {}),
          el('td', { class: 'r' }, fmtR(t.cur)), el('td', {}),
          el('td', { class: 'r' }, fmtR(t.prop)),
          el('td', { class: 'r ' + (t.delta < 0 ? 'rneg' : t.delta > 0 ? 'rpos' : '') }, fmtR(t.delta, true)),
          el('td', {})),
      )),
    adv.length ? el('ul', { class: 'badv' }, adv.map(a => el('li', {}, a))) : null,
  );
}
// Headline summary + a factual, understated rationale for the Cartrack proposal.
function reportSummary(withQuotes, p) {
  if (!withQuotes.length) return null;
  const n = withQuotes.length;
  let added = 0, hasSasria = false, hasAssist = false;
  for (const b of withQuotes) {
    const q = selQuote(b);
    for (const l of q.lines) {
      if (lineStatus(l).st === 'added') added++;
      if (l.prop != null && /sasria/i.test(l.s)) hasSasria = true;
      if (l.prop != null && /assist/i.test(l.s)) hasAssist = true;
    }
  }
  const saving = p.delta < -0.004, increase = p.delta > 0.004;
  const annual = Math.abs(p.delta) * 12;
  const fig = (l, v, s, cls) => el('div', { class: 'rfig' },
    el('div', { class: 'l' }, l), el('div', { class: 'v' + (cls ? ' ' + cls : '') }, v), s ? el('div', { class: 's' }, s) : null);

  // Facts only — states the position; the sell is left implicit.
  const parts = [];
  parts.push(n + ' building' + (n > 1 ? 's are' : ' is') + ' compared against a single consolidated Cartrack Insurance proposal.');
  if (saving) parts.push('The proposed portfolio premium is ' + fmtR(p.prop) + ' per month (' + fmtR(p.prop * 12) + ' per year) — ' + fmtR(annual) + ' per year less than the current ' + fmtR(p.cur * 12) + '.');
  else if (increase) parts.push('The proposed portfolio premium is ' + fmtR(p.prop) + ' per month, ' + fmtR(annual) + ' per year above the current spend, reflecting corrected sums insured and added cover.');
  else parts.push('The proposed portfolio premium matches the current spend at ' + fmtR(p.prop) + ' per month.');
  if (added) parts.push(added + ' cover section' + (added > 1 ? 's not carried on the current schedules are' : ' not carried on the current schedule is') + ' included in the proposal.');
  if (hasSasria || hasAssist) parts.push('Premiums are quoted all-in' + (hasSasria && hasAssist ? ', inclusive of SASRIA and Assist' : hasSasria ? ', inclusive of SASRIA' : ', inclusive of Assist') + '.');

  return el('div', {},
    el('div', { class: 'rsummary' },
      fig('Current — monthly', fmtR(p.cur), n + ' building' + (n > 1 ? 's' : '')),
      fig('Cartrack proposed — monthly', fmtR(p.prop), 'all-in premium'),
      fig('Net variance', fmtR(p.delta, true),
        saving ? 'saves ' + fmtR(annual) + ' / year' : increase ? 'adds ' + fmtR(annual) + ' / year' : 'like-for-like',
        saving ? 'rneg' : increase ? 'rpos' : '')),
    el('div', { class: 'rnote' },
      el('h3', {}, 'Summary'),
      el('p', {}, parts.join(' ')),
      el('ul', {},
        el('li', {}, 'One portfolio and renewal cycle across all ' + n + ' building' + (n > 1 ? 's' : '') + ', under a single point of contact.'),
        el('li', {}, 'Cover is set out line-for-line below, so each section can be checked against the current policy.'),
        saving ? el('li', {}, 'Lower total premium while cover on compared sections is maintained or improved.')
          : el('li', {}, 'Sums insured are aligned to replacement value across the portfolio.'))),
  );
}
// Portfolio-level option summary cards + rationale (multi-option mode).
function reportSummaryMulti() {
  const op = optionPortfolio();
  if (!op.options.length) return null;
  const recOpt = op.options.find(o => o.key === op.recId);
  const card = (title, val, sub, rec) => el('div', { class: 'optcard' + (rec ? ' rec' : '') },
    el('div', { class: 'oi' }, title, rec ? el('span', { class: 'recbadge' }, 'Best value') : null),
    el('div', { class: 'ov' }, val), sub ? el('div', { class: 'os' }, sub) : null);
  return el('div', {},
    el('div', { class: 'optcards' },
      card('Client current', fmtR(op.cur), 'monthly, all buildings', false),
      ...op.options.map(o => { const d = o.prop - op.cur, an = Math.abs(d) * 12;
        return card(o.insurer, fmtR(o.prop),
          op.cur ? (d < 0 ? 'saves ' + fmtR(an) + '/yr' : d > 0 ? fmtR(an) + '/yr more' : 'like-for-like') : 'per month',
          o.key === op.recId); })),
    el('div', { class: 'rnote' }, el('h3', {}, 'Options summary'),
      el('p', {}, op.options.length + ' Cartrack options are presented side by side against the client’s current cover'
        + (recOpt ? ', with ' + recOpt.insurer + ' the lowest total premium at ' + fmtR(recOpt.prop) + ' per month' : '')
        + '. Each cover section is compared below; the lowest premium for each section is ticked, and any section an option did not quote is flagged.')));
}
// Building × option grid (multi-option, multiple buildings).
function portfolioOptionTable() {
  const op = optionPortfolio();
  const bldgs = state.buildings.filter(b => optionQuotes(b).length);
  return el('div', {}, el('h3', { style: 'margin-top:0' }, 'Portfolio summary'),
    el('div', { class: 'rscroll' }, el('table', { class: 'rtable' },
      el('thead', {}, el('tr', {}, el('th', {}, 'Building'), el('th', { class: 'r' }, 'Current R/m'),
        ...op.options.map(o => el('th', { class: 'opt r' + (o.key === op.recId ? ' rec' : '') },
          el('span', { class: 'oi' }, o.insurer, o.key === op.recId ? el('span', { class: 'recbadge' }, 'Best value') : null), 'R/m')))),
      el('tbody', {},
        bldgs.map(b => { const opts = optionQuotes(b);
          const curT = sectionUnion(opts).reduce((s, sec) => { const l = curCellFor(opts, sec.key); return s + (l && l.cur != null ? l.cur : 0); }, 0);
          const perOpt = op.options.map(o => { const q = opts.find(x => (x.optionId || x.id) === o.key); return q ? quoteTotals(q).prop : null; });
          const bestB = Math.min(...perOpt.filter(v => v != null));
          return el('tr', {}, el('td', {}, b.name), el('td', { class: 'r' }, fmtR(curT)),
            ...perOpt.map(v => el('td', { class: 'r' + (v != null && v === bestB ? ' best' : '') }, v == null ? '—' : fmtR(v)))); }),
        el('tr', { class: 'tot' }, el('td', {}, 'Portfolio total'), el('td', { class: 'r' }, fmtR(op.cur)),
          ...op.options.map(o => el('td', { class: 'r' + (o.key === op.recId ? ' best' : '') }, fmtR(o.prop))))))));
}

function screenReport() {
  const rm = RMS.find(r => r.id === state.rmId) || RMS[0];
  const p = portfolio();
  const multi = isMultiOption();
  const today = new Date().toLocaleDateString('en-ZA', { day: 'numeric', month: 'long', year: 'numeric' });
  const withQuotes = state.buildings.filter(b => { const q = selQuote(b); return q && q.lines.length; });
  return el('div', {},
    el('div', { class: 'eyebrow' }, 'Step 03'),
    el('h1', { class: 'pg' }, 'Client report'),
    el('p', { class: 'lede' }, 'A printable comparison for the client. Print to PDF from the button below — the page furniture is stripped automatically.'),
    el('div', { class: 'sheet' },
      el('div', { class: 'sheet-mast' },
        el('img', { src: 'assets/logos/cartrack-insurance-horizontal-white.png', alt: 'Cartrack Insurance' }),
        el('div', { class: 'doc' }, 'Commercial premium', el('br'), 'comparison')),
      el('div', { class: 'sheet-b' },
        el('h2', { class: 'rt' }, state.client.name || 'Premium comparison'),
        el('div', { class: 'rsub' },
          [state.client.type, state.client.renewal ? 'Renewal ' + state.client.renewal : '',
           'Prepared ' + today + ' by ' + rm.name + ', Cartrack Insurance'].filter(Boolean).join(' · ')),
        multi ? reportSummaryMulti() : reportSummary(withQuotes, p),
        multi
          ? (withQuotes.length > 1 ? portfolioOptionTable() : null)
          : (withQuotes.length > 1 ? el('div', {},
          el('h3', { style: 'margin-top:0' }, 'Portfolio summary'),
          el('table', { class: 'rtable' },
            el('thead', {}, el('tr', {},
              el('th', {}, 'Building'), el('th', {}, 'Proposed insurer'),
              el('th', { class: 'r' }, 'Current R/m'), el('th', { class: 'r' }, 'Proposed R/m'), el('th', { class: 'r' }, 'Δ / month'))),
            el('tbody', {},
              withQuotes.map(b => { const q = selQuote(b); const t = quoteTotals(q);
                return el('tr', {},
                  el('td', {}, b.name), el('td', {}, q.insurer || 'Cartrack'),
                  el('td', { class: 'r' }, fmtR(t.cur)), el('td', { class: 'r' }, fmtR(t.prop)),
                  el('td', { class: 'r ' + (t.delta < 0 ? 'rneg' : t.delta > 0 ? 'rpos' : '') }, fmtR(t.delta, true))); }),
              el('tr', { class: 'tot' },
                el('td', {}, 'Portfolio total'), el('td', {}),
                el('td', { class: 'r' }, fmtR(p.cur)), el('td', { class: 'r' }, fmtR(p.prop)),
                el('td', { class: 'r ' + (p.delta < 0 ? 'rneg' : p.delta > 0 ? 'rpos' : '') }, fmtR(p.delta, true))),
            ))) : null),
        withQuotes.map(b => reportBuilding(b)),
        el('div', { class: 'sig' },
          el('div', { class: 'who' }, el('b', {}, rm.name), el('span', {}, rm.role + ' · Cartrack Insurance')),
          el('div', { class: 'who', style: 'text-align:right' }, el('b', {}, 'Prepared ' + today),
            el('span', {}, 'Comparison of quoted monthly premiums'))),
        el('div', { class: 'fineprint' },
          'Figures are captured from insurer schedules and quotations by the Relationship Manager and are subject to the terms, conditions and exclusions of the underlying policy documents, which prevail over this summary. E&OE. This document is a premium comparison and does not itself constitute advice or an offer of cover.'),
      ),
    ),
    el('div', { class: 'bar no-print' }, el('div', { class: 'bar-in' },
      el('button', { class: 'btn', onClick: () => go('review') }, '← Review'),
      el('div', { style: 'flex:1' }),
      el('button', { class: 'btn', onClick: sendToBook }, 'Send to RM book →'),
      el('button', { class: 'btn primary', onClick: () => window.print() }, 'Print / save as PDF'),
    )),
  );
}

/* ---------- Router ---------- */
/* ---------- welcome gate: pick your name ---------- */
const WELCOME_QUOTES = [
  ["You don't close a sale; you open a relationship.","Patricia Fripp"],
  ["Make a customer, not a sale.","Katherine Barchetti"],
  ["Stop selling. Start helping.","Zig Ziglar"],
  ["The harder you work, the luckier you get.","Gary Player"],
  ["People don't buy for logical reasons. They buy for emotional reasons.","Zig Ziglar"],
  ["If you are not taking care of your customer, your competitor will.","Bob Hooey"],
  ["Approach each customer with the idea of helping them solve a problem.","Brian Tracy"],
  ["Success is the sum of small efforts, repeated day in and day out.","Robert Collier"],
  ["Your attitude, not your aptitude, will determine your altitude.","Zig Ziglar"],
  ["Great things never came from comfort zones.","Anonymous"],
  ["Opportunities don't happen. You create them.","Chris Grosser"],
  ["The best way to predict the future is to create it.","Peter Drucker"],
];
const WELCOME_LINES = [
  "Let's find them a better deal than what they've got.",
  "Time to sharpen the numbers.",
  "Build it clean — the comparison sells itself.",
  "Every gap you spot is a client you keep.",
  "Make the proposal impossible to say no to.",
  "Show them exactly why Cartrack wins.",
];
function greetWord(){ const h=new Date().getHours(); return h<12?'Good morning':h<17?'Good afternoon':'Good evening'; }
function screenWelcome(){
  const dayN=Math.floor(new Date(new Date().getFullYear(),new Date().getMonth(),new Date().getDate()).getTime()/864e5);
  const [qt,qb]=WELCOME_QUOTES[((dayN % WELCOME_QUOTES.length)+WELCOME_QUOTES.length)%WELCOME_QUOTES.length];
  const grid = el('div',{class:'rm-grid'},
    RMS.map((r,i)=> el('button',{class:'rm-tile', style:`animation-delay:${(0.04*i+0.05).toFixed(2)}s`, onClick:()=>pickRm(r.id)},
      el('div',{class:'av'}, r.initials),
      el('div',{},
        el('div',{class:'nm'}, r.name),
        el('div',{class:'rl'}, r.role)),
      el('span',{class:'arr'},'→')
    ))
  );
  return el('div',{class:'welcome'},
    el('div',{class:'wel-top'},
      el('div',{class:'b'}, 'CARTRACK ', el('span',{},'INSURANCE')),
      el('div',{class:'meta'}, el('div',{},'Premium Comparison'), el('div',{style:'color:#7C8492'},'FSP 17266'))),
    el('div',{class:'wel-body'},
      el('div',{class:'wel-kick'}, greetWord()+' — Commercial team'),
      el('h1',{class:'wel-h', html:'Who’s comparing <span class="accent">today?</span>'}),
      el('p',{class:'wel-sub'}, 'Tap your name to start a fresh comparison. Everything you load stays on this device only.'),
      grid,
      el('div',{class:'wel-quote'},
        el('div',{class:'ql'}, 'Fuel for the day'),
        el('blockquote',{}, '“'+qt+'”'),
        el('div',{class:'qby'}, '— '+qb))
    )
  );
}
function pickRm(id){
  const rm = RMS.find(r=>r.id===id) || RMS[0];
  state.rmId = id; state.rmChosen = true; state.step='upload'; save();
  const first = String(rm.name).split('/')[0];
  const line = WELCOME_LINES[Math.floor(Math.random()*WELCOME_LINES.length)];
  const flash = el('div',{class:'wel-flash'},
    el('div',{class:'fav'}, rm.initials),
    el('div',{class:'fh'}, 'You’re up, '+first+'!'),
    el('div',{class:'fs'}, line));
  document.body.append(flash);
  setTimeout(()=>{ flash.remove(); render(); }, 1300);
}

function render() {
  const mast = document.querySelector('.masthead');
  if (!state.rmChosen) {
    if (mast) mast.style.display = 'none';
    const app = $('#app'); app.innerHTML = ''; app.append(screenWelcome());
    return;
  }
  if (mast) mast.style.display = '';
  renderHeader();
  const app = $('#app'); app.innerHTML = '';
  if (state.step === 'upload') app.append(screenUpload());
  else if (state.step === 'review') app.append(screenReview());
  else app.append(screenReport());
}
render();

}
