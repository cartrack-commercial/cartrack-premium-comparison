<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F47735">
<title>Cartrack Insurance — Premium Comparison</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="assets/logos/cartrack-insurance-mark.png">

<!-- Cartrack Insurance Compliance Design System — token layer only (plain CSS custom properties) -->
<link rel="stylesheet" href="_ds/cartrack-insurance-compliance-design-sys-6fdc1bd8-d4b3-4d41-9483-367d24521aed/tokens/fonts.css">
<link rel="stylesheet" href="_ds/cartrack-insurance-compliance-design-sys-6fdc1bd8-d4b3-4d41-9483-367d24521aed/tokens/colors.css">
<link rel="stylesheet" href="_ds/cartrack-insurance-compliance-design-sys-6fdc1bd8-d4b3-4d41-9483-367d24521aed/tokens/typography.css">
<link rel="stylesheet" href="_ds/cartrack-insurance-compliance-design-sys-6fdc1bd8-d4b3-4d41-9483-367d24521aed/tokens/layout.css">
<link rel="stylesheet" href="_ds/cartrack-insurance-compliance-design-sys-6fdc1bd8-d4b3-4d41-9483-367d24521aed/tokens/base.css">

<style>
  :root { --maxw: 1120px; --font-head: "Saira", system-ui, sans-serif;
    --font-body: "IBM Plex Sans", system-ui, sans-serif; --font-mono: "IBM Plex Mono", ui-monospace, monospace;
    /* professional refresh: pure-white canvas, softer hairlines (override design-system tokens) */
    --color-canvas: #FFFFFF; --hairline: #E7EAEF; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background: var(--color-canvas, #FFFFFF); color: var(--color-text, #14161B);
    font-family: var(--font-body); font-size: 14px; line-height: 1.5; -webkit-text-size-adjust: 100%; }
  h1, h2, h3, .head { font-family: var(--font-head); }
  .mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
  button { font-family: inherit; }

  /* ---- Masthead ---- */
  .masthead { background: var(--color-surface-inverse, #0B0C0F); color: #fff;
    padding: 12px max(16px, env(safe-area-inset-left)); display: flex; align-items: center;
    gap: 16px; flex-wrap: wrap; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand img { height: 26px; width: auto; display: block; }
  .brand .name { font-family: var(--font-head); font-weight: 800; letter-spacing: .02em;
    font-size: 15px; line-height: 1; }
  .brand .name small { display: block; font-size: 10px; font-weight: 600; letter-spacing: .18em;
    color: var(--orange-400, #F58C4F); margin-top: 3px; }
  .steps { display: flex; gap: 4px; margin-left: 8px; flex-wrap: wrap; }
  .step { display: flex; align-items: center; gap: 7px; padding: 5px 10px; border-radius: 6px;
    font-size: 12px; color: var(--ink-300, #A8AFBC); cursor: pointer; border: 1px solid transparent;
    background: transparent; }
  .step[aria-current="true"] { color: #fff; background: rgba(255,255,255,.06);
    border-color: rgba(255,255,255,.12); }
  .step .n { font-family: var(--font-mono); font-size: 11px; padding: 1px 5px; border-radius: 4px;
    background: rgba(255,255,255,.1); }
  .step[aria-current="true"] .n { background: var(--orange-500, #F47735); color: #fff; }
  .spacer { flex: 1 1 auto; }
  .rm { display: flex; align-items: center; gap: 9px; background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.12); border-radius: 8px; padding: 5px 10px; }
  .rm .av { width: 30px; height: 30px; border-radius: 50%; background: var(--orange-500,#F47735);
    color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700;
    font-family: var(--font-head); font-size: 12px; }
  .rm select { background: transparent; color: #fff; border: none; font-family: var(--font-head);
    font-weight: 700; font-size: 13px; outline: none; }
  .rm select option { color: #14161B; }
  .rm .role { font-size: 10px; color: var(--ink-300,#A8AFBC); }

  /* ---- Page ---- */
  main { max-width: var(--maxw); margin: 0 auto; padding: 24px max(16px, env(safe-area-inset-left)) 64px; }
  .eyebrow { font-size: 11px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase;
    color: var(--color-accent, #F47735); }
  h1 { font-size: 30px; font-weight: 800; margin: 6px 0 10px; }
  .lede { color: var(--color-text-muted, #5E6675); max-width: 680px; margin: 0 0 24px; }

  .card { background: var(--color-surface, #fff); border: 1px solid var(--hairline, #E7EAEF);
    border-radius: 12px; box-shadow: 0 1px 2px rgba(11,12,15,.05), 0 2px 8px rgba(11,12,15,.04); }
  .card + .card { margin-top: 20px; }
  .card-h { display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 14px 18px; border-bottom: 1px solid var(--color-divider, #DFE3E9); flex-wrap: wrap; }
  .card-h h2 { font-size: 14px; font-weight: 800; letter-spacing: .01em; margin: 0; display: flex; align-items: center; gap: 8px; color: var(--color-text, #0B0C0F); }
  .card-h h2::before { content: ""; width: 14px; height: 2px; background: var(--color-accent, #F47735); border-radius: 2px; flex: none; }
  .card-h .n { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-subtle,#7C8492); }
  .card-b { padding: 18px; }
  .muted { color: var(--color-text-muted, #5E6675); }

  label.field { display: block; }
  label.field .lab { font-size: 11px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
    color: var(--color-text-muted, #5E6675); margin-bottom: 6px; }
  input, select.inp, textarea { width: 100%; padding: 11px 12px; border: 1px solid var(--color-border, #CDD2DB);
    border-radius: 8px; font-family: inherit; font-size: 14px; background: #fff; color: inherit; }
  textarea { resize: vertical; min-height: 70px; }
  input:focus, select.inp:focus, textarea:focus { outline: 2px solid var(--color-focus-ring, #F47735);
    outline-offset: 1px; border-color: var(--color-accent, #F47735); }
  input.sm { padding: 7px 9px; font-size: 13px; }
  input.money { font-family: var(--font-mono); text-align: right; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

  .dropzone { border: 1.5px dashed var(--color-border-strong, #A8AFBC); border-radius: 10px;
    padding: 26px 18px; text-align: center; cursor: pointer; background: var(--ink-25, #FAFBFC);
    transition: border-color .15s, background .15s; }
  .dropzone:hover, .dropzone.drag { border-color: var(--color-accent, #F47735); background: var(--orange-50,#FEF4EC); }
  .dropzone .big { font-weight: 700; }
  .dropzone .sub { font-size: 12px; color: var(--color-text-subtle,#7C8492); margin-top: 4px; }

  .file { display: flex; align-items: center; gap: 12px; padding: 11px 12px; border: 1px solid var(--color-border,#CDD2DB);
    border-radius: 9px; margin-bottom: 10px; background: #fff; }
  .file .kind { font-family: var(--font-mono); font-size: 10px; font-weight: 700; color: #fff;
    padding: 3px 6px; border-radius: 4px; }
  .file .kind.PDF { background: var(--red-600,#BE3A30); }
  .file .kind.XLSX { background: var(--green-700,#166B46); }
  .file .meta { flex: 1 1 auto; min-width: 0; }
  .file .meta .nm { font-weight: 600; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file .meta .st { font-size: 11px; color: var(--color-text-subtle,#7C8492); margin-top: 2px; }
  .file .x { border: none; background: transparent; cursor: pointer; color: var(--color-text-subtle,#7C8492);
    font-size: 18px; line-height: 1; padding: 4px; border-radius: 6px; }
  .file .x:hover { background: var(--red-100,#FBE9E7); color: var(--red-600,#BE3A30); }
  .pill { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; white-space: nowrap; }
  .pill.ok, .pill.saving, .pill.added { background: var(--green-100,#E6F3EC); color: var(--green-700,#166B46); }
  .pill.busy { background: var(--blue-100,#E8EEF9); color: var(--blue-700,#21437F); }
  .pill.err, .pill.gap { background: var(--red-100,#FBE9E7); color: var(--red-700,#98271F); }
  .pill.increase { background: var(--amber-100,#FAF0D9); color: var(--amber-700,#8A610C); }
  .pill.matched { background: var(--ink-100,#ECEEF2); color: var(--ink-600,#454C58); }

  .bar { position: sticky; bottom: 0; background: color-mix(in srgb, var(--color-canvas,#F4F6F8) 92%, transparent);
    backdrop-filter: blur(6px); border-top: 1px solid var(--color-border,#CDD2DB); padding: 12px 0;
    margin: 28px calc(-1 * max(16px, env(safe-area-inset-left))) 0; }
  .bar-in { max-width: var(--maxw); margin: 0 auto; padding: 0 max(16px, env(safe-area-inset-left));
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .btn { padding: 11px 18px; border-radius: 9px; font-weight: 700; font-size: 14px; cursor: pointer;
    border: 1px solid var(--color-border,#CDD2DB); background: #fff; color: var(--color-text,#14161B); }
  .btn.primary { background: var(--color-accent,#F47735); border-color: var(--color-accent,#F47735); color: #fff; }
  .btn.primary:hover { background: var(--color-accent-hover,#E2631C); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn.sm { padding: 7px 12px; font-size: 12px; }
  .btn.ghost { background: transparent; }
  .btn.danger { color: var(--red-600,#BE3A30); }

  .note { font-size: 12px; color: var(--color-text-muted,#5E6675); display: flex; gap: 8px; align-items: flex-start; }
  .note .dot { color: var(--color-accent,#F47735); font-weight: 800; }

  /* ---- Review: rollup ---- */
  .rollup { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .stat { background: var(--color-surface,#fff); border: 1px solid var(--color-border,#CDD2DB);
    border-radius: 12px; padding: 14px 16px; }
  .stat .lab { font-size: 10px; font-weight: 700; letter-spacing: .13em; text-transform: uppercase;
    color: var(--color-text-subtle,#7C8492); margin-bottom: 5px; }
  .stat .val { font-family: var(--font-mono); font-size: 21px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .stat .sub { font-size: 11px; color: var(--color-text-subtle,#7C8492); margin-top: 3px; }

  /* ---- Review: building / quote ---- */
  .bmeta { display: grid; grid-template-columns: 2fr 1.4fr 2fr 1fr; gap: 10px; }
  .qtabs { display: flex; gap: 6px; flex-wrap: wrap; }
  .qtab { padding: 6px 12px; border-radius: 20px; border: 1px solid var(--color-border,#CDD2DB);
    background: #fff; font-size: 12px; font-weight: 600; cursor: pointer; }
  .qtab[aria-current="true"] { background: var(--ink-950,#0B0C0F); color: #fff; border-color: var(--ink-950,#0B0C0F); }
  .qmeta { display: grid; grid-template-columns: 1.6fr 1fr 1.4fr auto; gap: 10px; align-items: end; }

  /* line grid: section | cur limit | cur R | prop limit | prop R | delta | status | x */
  .lines { border: 1px solid var(--color-border,#CDD2DB); border-radius: 10px; overflow: hidden; margin-top: 14px; }
  .lrow { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr .9fr .8fr 34px;
    gap: 0; align-items: center; border-bottom: 1px solid var(--color-divider,#DFE3E9); background: #fff; }
  .lrow:last-child { border-bottom: none; }
  .lrow > div { padding: 7px 8px; min-width: 0; }
  .lrow.lhead { background: var(--color-surface-sunken,#ECEEF2); font-size: 10px; font-weight: 700;
    letter-spacing: .08em; text-transform: uppercase; color: var(--ink-600,#454C58); }
  .lrow input { border-color: transparent; background: transparent; padding: 6px 7px; font-size: 13px; border-radius: 6px; }
  .lrow input:hover { border-color: var(--color-border,#CDD2DB); background: #fff; }
  .lrow input:focus { background: #fff; }
  .lrow .delta { font-family: var(--font-mono); font-size: 12.5px; text-align: right; font-variant-numeric: tabular-nums; }
  .lrow .delta.neg { color: var(--green-700,#166B46); }
  .lrow .delta.pos { color: var(--red-600,#BE3A30); }
  .lrow .xc { text-align: center; }
  .lrow .lab-m { display: none; }
  .ltogs { display: flex; gap: 4px; margin-top: 3px; padding: 0 7px; }
  .ltoggle { font-size: 9px; font-weight: 700; letter-spacing: .02em; padding: 1px 5px; border-radius: 4px;
    border: 1px solid var(--color-border,#CDD2DB); background: #fff; color: var(--ink-400,#7C8492); cursor: pointer; }
  .ltoggle.on { background: var(--orange-500,#F47735); border-color: var(--orange-500,#F47735); color: #fff; }
  .lchips { display: flex; flex-wrap: wrap; gap: 4px; margin: 4px 7px 0; }
  .lchip { display: inline-flex; align-items: center; font-size: 9.5px; font-weight: 700; line-height: 1.3;
    padding: 1px 6px; border-radius: 4px; border: 1px solid; }
  .lchip.err { background: var(--red-100,#FBE9E7); color: var(--red-700,#98271F); border-color: var(--red-200,#f3c9c4); }
  .lchip.increase { background: var(--amber-100,#FAF0D9); color: var(--amber-700,#8A610C); border-color: #ecdba8; }
  .lchip.saving { background: var(--green-100,#E6F3EC); color: var(--green-700,#166B46); border-color: #bfe3cf; }
  .ltotal { display: flex; justify-content: flex-end; gap: 26px; padding: 10px 14px;
    background: var(--ink-25,#FAFBFC); border-top: 1px solid var(--color-divider,#DFE3E9);
    font-family: var(--font-mono); font-size: 13px; flex-wrap: wrap; }
  .ltotal b { font-weight: 600; }

  details.src { border: 1px solid var(--color-border,#CDD2DB); border-radius: 10px; background: #fff;
    padding: 0; margin-bottom: 10px; }
  details.src summary { cursor: pointer; padding: 11px 14px; font-weight: 600; font-size: 13px; }
  details.src pre { margin: 0; padding: 12px 14px; border-top: 1px solid var(--color-divider,#DFE3E9);
    max-height: 260px; overflow: auto; font-family: var(--font-mono); font-size: 11px;
    white-space: pre-wrap; word-break: break-word; background: var(--ink-25,#FAFBFC); }

  .placeholder-screen { text-align: center; padding: 60px 20px; color: var(--color-text-muted,#5E6675); }
  .placeholder-screen h2 { font-size: 20px; color: var(--color-text,#14161B); }

  /* ---- Report ---- */
  .sheet { background: #fff; border: 1px solid var(--color-border,#CDD2DB); border-radius: 4px;
    max-width: 800px; margin: 0 auto; padding: 0; overflow: hidden; }
  .sheet-mast { background: var(--ink-950,#0B0C0F); color: #fff; padding: 22px 30px;
    display: flex; align-items: center; justify-content: space-between; gap: 14px; }
  .sheet-mast img { height: 24px; }
  .sheet-mast .doc { font-family: var(--font-mono); font-size: 10px; letter-spacing: .12em;
    text-transform: uppercase; color: var(--ink-300,#A8AFBC); text-align: right; }
  .sheet-b { padding: 26px 30px 34px; }
  .sheet h2.rt { font-size: 22px; margin: 0 0 2px; }
  .sheet .rsub { font-size: 12px; color: var(--color-text-muted,#5E6675); margin-bottom: 22px; }
  .rtable { width: 100%; border-collapse: collapse; font-size: 12px; margin: 8px 0 4px; }
  .rtable th { text-align: left; font-size: 9.5px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--ink-600,#454C58); background: var(--ink-100,#ECEEF2); padding: 7px 9px;
    border: 1px solid var(--ink-150,#DFE3E9); }
  .rtable td { padding: 7px 9px; border: 1px solid var(--ink-150,#DFE3E9); vertical-align: top; }
  .rtable td.r, .rtable th.r { text-align: right; font-family: var(--font-mono); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .rtable tr.tot td { background: var(--ink-25,#FAFBFC); font-weight: 700; }
  .rneg { color: var(--green-700,#166B46); } .rpos { color: var(--red-600,#BE3A30); }
  /* ---- multi-option comparison ---- */
  .rscroll { overflow-x: auto; margin: 8px 0 4px; }
  .rtable th.opt { text-align: right; }
  .rtable th.opt .oi { display: block; font-size: 11px; letter-spacing: 0; text-transform: none; color: var(--ink-800,#1E222A); font-weight: 700; }
  .rtable th.rec, .rtable td.best { background: var(--orange-50,#FEF4EC); }
  .rtable th.rec { box-shadow: inset 0 3px 0 var(--orange-500,#F47735); }
  .rtable td.best { color: var(--green-700,#166B46); font-weight: 700; }
  .rtable td.best .btick { color: var(--green-700,#166B46); font-weight: 700; }
  .rtable td.gapc { color: var(--red-600,#BE3A30); }
  .recbadge { display: inline-block; font-size: 8px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase;
    background: var(--orange-500,#F47735); color: #fff; padding: 1px 5px; border-radius: 3px; margin-left: 5px; vertical-align: middle; }
  .savechip { display: block; font-size: 9.5px; font-weight: 600; margin-top: 1px; }
  .optcards { display: grid; gap: 10px; margin: 4px 0 20px; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
  .optcard { border: 1px solid var(--ink-150,#DFE3E9); border-radius: 8px; padding: 11px 13px; position: relative; }
  .optcard.rec { border-color: var(--orange-500,#F47735); box-shadow: inset 0 3px 0 var(--orange-500,#F47735); }
  .optcard .oi { font-family: var(--font-head); font-weight: 700; font-size: 13px; }
  .optcard .ov { font-family: var(--font-mono); font-size: 17px; font-weight: 600; margin-top: 4px; font-variant-numeric: tabular-nums; }
  .optcard .os { font-size: 10px; color: var(--ink-500,#5E6675); margin-top: 2px; }
  .sheet h3 { font-size: 13px; margin: 24px 0 4px; }
  .sheet .badv { margin: 6px 0 0; padding-left: 18px; font-size: 11.5px; color: var(--ink-700,#2F343D); }
  .sheet .badv li { margin-bottom: 3px; }
  .sig { margin-top: 34px; padding-top: 16px; border-top: 1px solid var(--ink-150,#DFE3E9);
    display: flex; justify-content: space-between; gap: 20px; flex-wrap: wrap; font-size: 11.5px; }
  .sig .who b { display: block; font-size: 13px; }
  .sig .who span { color: var(--color-text-muted,#5E6675); }
  .fineprint { margin-top: 14px; font-size: 9.5px; color: var(--ink-400,#7C8492); line-height: 1.5; }

  /* ---- Responsive: full parity ---- */
  @media (max-width: 860px) {
    .bmeta, .qmeta { grid-template-columns: 1fr 1fr; }
    .rollup { grid-template-columns: 1fr; }
  }
  @media (max-width: 720px) {
    h1 { font-size: 24px; }
    .grid3 { grid-template-columns: 1fr; }
    .panels { grid-template-columns: 1fr; }
    .steps { order: 3; width: 100%; }
    .masthead { gap: 10px; }
    .bmeta, .qmeta { grid-template-columns: 1fr; }
    /* line rows become stacked cards with labels */
    .lrow { grid-template-columns: 1fr 1fr; padding: 8px 6px; gap: 2px 8px; }
    .lrow.lhead { display: none; }
    .lrow > div { padding: 3px 6px; }
    .lrow .c-sec { grid-column: 1 / -1; }
    .lrow .lab-m { display: block; font-size: 9px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--ink-400,#7C8492); margin-bottom: 1px; }
    .lrow .xc { grid-column: 2; text-align: right; }
  }

  /* ---- Print: the report sheet only ---- */
  @media print {
    @page { size: A4; margin: 10mm; }
    body { background: #fff; }
    .masthead, .bar, .no-print, .eyebrow, h1.pg, .lede { display: none !important; }
    main { padding: 0; max-width: none; }
    .sheet { border: none; max-width: none; border-radius: 0; }
    * { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
    .rtable, .sheet h3, .rsummary, .rnote { break-inside: avoid; }
  }

  /* Report headline summary + rationale */
  .rsummary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 4px 0 20px; }
  .rfig { border: 1px solid var(--ink-150,#DFE3E9); border-radius: 6px; padding: 11px 13px; }
  .rfig .l { font-size: 9px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
    color: var(--ink-500,#5E6675); }
  .rfig .v { font-family: var(--font-mono); font-size: 19px; font-weight: 600; margin-top: 3px; font-variant-numeric: tabular-nums; }
  .rfig .s { font-size: 10.5px; color: var(--ink-500,#5E6675); margin-top: 2px; }
  .rnote { border-left: 3px solid var(--orange-500,#F47735); background: var(--orange-50,#FEF4EC);
    padding: 12px 15px; border-radius: 0 6px 6px 0; margin: 0 0 22px; }
  .rnote h3 { margin: 0 0 5px; font-size: 12px; }
  .rnote p { margin: 0 0 6px; font-size: 11.5px; line-height: 1.55; color: var(--ink-800,#1E222A); }
  .rnote ul { margin: 6px 0 0; padding-left: 18px; font-size: 11.5px; color: var(--ink-800,#1E222A); }
  .rnote li { margin-bottom: 3px; }
  @media (max-width: 640px) { .rsummary { grid-template-columns: 1fr; } }

  /* ---------- welcome / pick-your-name gate ---------- */
  .welcome { min-height: 100vh; background:
      radial-gradient(760px 380px at 88% -12%, rgba(244,119,53,.10), transparent 62%),
      radial-gradient(560px 320px at -8% 116%, rgba(244,119,53,.05), transparent 60%), #FFFFFF;
    display: flex; flex-direction: column; }
  .wel-top { background:#000; color:#fff; padding:14px 22px; display:flex; align-items:center; justify-content:space-between; }
  .wel-top .b { font-family: var(--font-head); font-weight:800; font-size:16px; letter-spacing:.02em; }
  .wel-top .b span { color: var(--orange-500,#F47735); }

<!-- Local, in-browser extraction libraries (no server; files never leave the device) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- OCR engine for scanned (image-only) PDFs — runs in the browser, loads on first use -->

<script type="module">
import * as pdfjsLib from "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs";
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.mjs";

/* ============================================================
   Cartrack Premium Comparison — skeleton (iteration 2)
   Device-only: state lives in sessionStorage for the current visit only — every
   new visit starts clean (client data never lingers on a device). No backend.
   Upload → local extraction → seeded, editable Review → Report.
   ============================================================ */

const RMS = [
  { id: 'hein', name: 'Hein', initials: 'H', role: 'Commercial RM' },
  { id: 'jean', name: 'Jean', initials: 'J', role: 'Commercial RM' },
  { id: 'elizabeth', name: 'Elizabeth', initials: 'E', role: 'Commercial RM' },
  { id: 'bronwyn', name: 'Bronwyn', initials: 'BR', role: 'Commercial RM' },
  { id: 'bernard', name: 'Bernard', initials: 'BE', role: 'Commercial RM' },
  { id: 'cules', name: 'Cules', initials: 'C', role: 'Commercial RM' },
  { id: 'phillip', name: 'Phillip', initials: 'P', role: 'Commercial RM' },
  { id: 'house', name: 'Cartrack (House)', initials: 'CT', role: 'House account' },
];
const STEPS = [
  { id: 'upload', label: 'Upload' },
  { id: 'review', label: 'Review' },
  { id: 'report', label: 'Client report' },
];
const INSURERS = ['Santam','Western','Bryte','AIG','Hollard','Old Mutual Insure','Discovery Insure',
  'Momentum','Auto & General','King Price','OUTsurance','Renasa','Lombard','Infiniti','GENRIC','Guardrisk'];
const COMMON_SECTIONS = ['Buildings Combined','Business All Risks','Accidental Damage','Power Surge',
  'Electronic Equipment','Glass','Public Liability','Commercial Umbrella Liability','Money',
  'Geyser Replacement','Fidelity Guarantee','SASRIA','Broker & assist fees'];

const STORE_KEY = 'ct-compare-v1';
// Where the RM System lives. A won comparison is handed off to the book via
// <RM_SYSTEM_URL>#import=<base64url payload> — kept decoupled (no DB creds here).
const RM_SYSTEM_URL = 'https://cartrack-commercial.github.io/cartrack-rm-system/';
const blank = () => ({
  rmId: null, rmChosen: false, step: 'upload',
  client: { name: '', type: 'Portfolio — multiple buildings', renewal: '' },
  options: [{ id: uid(), insurer: '' }], // Cartrack proposal options (insurers) shown to the client
  files: { schedule: [], quote: [] }, // {id,name,size,kind,status,text,chars,error,optionId}
  seeded: false,
  buildings: [],  // {id,name,entity,addr,si,selQ}
  quotes: [],     // {id,buildingId,insurer,quoteNo,note,advisories, lines:[{id,s,curL,cur,propL,prop,curStr,propStr}]}
});

let state = load();
function load() {
  try {
    // Client data must never linger on a device between visits: purge any copy
    // saved by older builds (localStorage persisted across sessions), then read
    // only sessionStorage — survives an accidental refresh mid-comparison, but
    // every new visit (new tab / reopened browser) starts clean.
    try { localStorage.removeItem(STORE_KEY); } catch {}
    const s = JSON.parse(sessionStorage.getItem(STORE_KEY));
    if (!s || !s.files) return blank();
    s.buildings ||= []; s.quotes ||= []; s.seeded ||= false;
    if (!s.options || !s.options.length) s.options = [{ id: uid(), insurer: '' }];
    return s;
  } catch { return blank(); }
}
function save() { try { sessionStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch {} }

const $ = (s, r=document) => r.querySelector(s);
const el = (tag, props={}, ...kids) => {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(props)) {
    if (k === 'class') n.className = v;
    else if (k === 'html') n.innerHTML = v;
    else if (k.startsWith('on')) n.addEventListener(k.slice(2).toLowerCase(), v);
    else if (v !== false && v != null) n.setAttribute(k, v);
  }
  for (const c of kids.flat()) if (c != null) n.append(c.nodeType ? c : document.createTextNode(c));
  return n;
};
// Hoisted (function declaration) so blank()/load() can use it during the
// top-level `let state = load()` — a const arrow here would be in its TDZ.
function uid() { return Math.random().toString(36).slice(2, 9); }
const fmtSize = b => b < 1024 ? b+' B' : b < 1048576 ? (b/1024).toFixed(0)+' KB' : (b/1048576).toFixed(1)+' MB';

/* ---------- money ---------- */
function parseMoney(v) {
  if (v == null || v === '') return null;
  const s = String(v).replace(/[Rr]\s?/,'').replace(/\s/g,'').replace(/,(?=\d{3}\b)/g,'').replace(',','.');
  const n = parseFloat(s);
  return Number.isFinite(n) ? n : null;
}
function fmtR(n, sign=false) {
  if (n == null || !Number.isFinite(n)) return '—';
  const neg = n < 0; const a = Math.abs(n);
  const s = a.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
  return (neg ? '− ' : (sign && n > 0 ? '+ ' : '')) + 'R ' + s;
}

/* ---------- comparison math (mirror of the data contract) ---------- */
// Parse a cover limit / sum insured into a number: "R 38.72M" -> 38720000,
// "R 250 000" -> 250000. Text limits (Included / Statutory / Full value) -> null.
function parseLimit(str) {
  if (str == null) return null;
  const s = String(str).trim();
  if (!s || /included|statutory|full\s*value|not\s*quoted|—|^-$/i.test(s)) return null;
  const m = /([\d][\d\s.,]*)\s*([MmKk])?/.exec(s.replace(/[Rr]/g, ''));
  if (!m) return null;
  let n = parseFloat(m[1].replace(/\s/g, '').replace(/,(?=\d{3}\b)/g, ''));
  if (!Number.isFinite(n)) return null;
  if (m[2]) n *= /[Mm]/.test(m[2]) ? 1e6 : 1e3;
  return n;
}
function lineStatus(l) {
  if (l.propNq) return { delta: null, st: 'gap' };   // Cartrack didn't quote -> real gap
  const cur = l.cur, prop = l.prop;
  // Cartrack quoted where the current insurer gave no cover -> new cover won, not a gap.
  if (cur == null && prop != null) return { delta: null, st: 'added' };
  if (prop == null || cur == null) return { delta: null, st: 'gap' };
  const d = +(prop - cur).toFixed(2);
  return { delta: d, st: d < 0 ? 'saving' : d > 0 ? 'increase' : 'matched' };
}
// Per-line cover flags (from comparison-engine): a limit reduction and a
// coverage gap are advisory points even when the premium looks favourable.
function lineFlags(l) {
  const flags = [];
  const curHasCover = l.cur != null || l.curIncl || parseLimit(l.curL) != null;
  if (l.propNq) {
    flags.push({ kind: 'gap', text: curHasCover ? 'Not quoted — cover falls away' : 'Not quoted' });
    return flags;
  }
  const cl = parseLimit(l.curL), pl = parseLimit(l.propL);
  if (cl != null && pl != null && cl - pl > 0.5)
    flags.push({ kind: 'limit', text: 'Limit reduced by ' + fmtLimit(cl - pl) });
  return flags;
}
function quoteTotals(q) {
  let cur = 0, prop = 0, comparable = 0, gaps = 0, added = 0;
  for (const l of q.lines) {
    const { st } = lineStatus(l);
    if (l.cur != null) cur += l.cur;
    if (l.prop != null) prop += l.prop;
    if (st === 'gap') gaps++;            // current covered, Cartrack didn't quote
    else if (st === 'added') added++;    // Cartrack added cover the client didn't have
    else comparable++;
  }
  return { cur: +cur.toFixed(2), prop: +prop.toFixed(2), delta: +(prop-cur).toFixed(2), comparable, gaps, added };
}
const quotesOf = b => state.quotes.filter(q => q.buildingId === b.id);
function selQuote(b) {
  const qs = quotesOf(b);
  return qs.find(q => q.id === b.selQ) || qs[0] || null;
}
function portfolio() {
  let cur = 0, prop = 0, n = 0;
  for (const b of state.buildings) {
    const q = selQuote(b); if (!q || !q.lines.length) continue;
    const t = quoteTotals(q); cur += t.cur; prop += t.prop; n++;
  }
  return { cur: +cur.toFixed(2), prop: +prop.toFixed(2), delta: +(prop-cur).toFixed(2), n };
}

/* ---------- won-quote → RM book handoff ---------- */
// UTF-8-safe base64url so the payload survives a URL hash.
function b64urlEncode(obj) {
  const b64 = btoa(unescape(encodeURIComponent(JSON.stringify(obj))));
  return b64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}
// Build a won-quote payload and open the RM System to add it to the book.
function sendToBook() {
  const quoted = state.buildings.filter(b => { const q = selQuote(b); return q && q.lines.length; });
  if (!quoted.length) { alert('Add at least one quote before sending to the book.'); return; }
  const client = (state.client.name || '').trim();
  if (!client) { alert('Enter the client name (Step 1) before sending to the book.'); return; }
  const p = portfolio();
  const insurers = [...new Set(quoted.map(b => (selQuote(b).insurer || 'Cartrack').trim()).filter(Boolean))];
  const payload = {
    v: 1, src: 'premium-comparison',
    rm: state.rmId,                    // matches the RM System rm_slug
    client,
    insurer: insurers.join(' / '),
    premiumMonthly: p.prop,            // total proposed monthly premium
    buildings: quoted.length,
    renewal: state.client.renewal || '',
    ts: Date.now(),
  };
  window.open(RM_SYSTEM_URL + '#import=' + b64urlEncode(payload), '_blank', 'noopener');
}

/* ---------- OCR fallback for scanned PDFs (in-browser, Tesseract) ---------- */
async function ocrPdf(pdf, onProgress) {
  if (typeof Tesseract === 'undefined') {
    throw new Error('Scanned file — OCR needs an internet connection the first time. Connect and retry, or ask for a digital (text) PDF.');
  }
  const worker = await Tesseract.createWorker('eng');
  let out = '';
  try {
    for (let p = 1; p <= pdf.numPages; p++) {
      if (onProgress) onProgress(p, pdf.numPages);
      const page = await pdf.getPage(p);
      const viewport = page.getViewport({ scale: 2 }); // 2x = sharper text for OCR
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width; canvas.height = viewport.height;
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      await page.render({ canvasContext: ctx, viewport }).promise;
      const { data: { text } } = await worker.recognize(canvas);
      out += text + '\n';
      canvas.width = 0; canvas.height = 0; // release memory between pages
    }
  } finally {
    await worker.terminate();
  }
  return out.trim();
}

/* ---------- Local extraction ---------- */
async function extractText(file, onProgress) {
  const name = file.name.toLowerCase();
  if (name.endsWith('.pdf')) {
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    let out = '';
    for (let p = 1; p <= pdf.numPages; p++) {
      const page = await pdf.getPage(p);
      const tc = await page.getTextContent();
      out += tc.items.map(i => i.str).join(' ') + '\n';
    }
    // A scanned (image-only) PDF has essentially no selectable text. When the
    // real text layer comes back near-empty, fall back to OCR — render each page
    // to an image and read it optically. Threshold scales with page count.
    if (out.replace(/\s/g, '').length < Math.max(40, pdf.numPages * 8)) {
      const ocr = await ocrPdf(pdf, onProgress);
      if (ocr.replace(/\s/g, '').length > out.replace(/\s/g, '').length) {
        return { text: ocr, sheets: null, ocr: true };
      }
    }
    return { text: out.trim(), sheets: null };
  }
  if (name.endsWith('.xlsx') || name.endsWith('.xls')) {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });
    // Sheet names are captured here, from the workbook itself — never from the
    // (possibly truncated) text — so every building tab is always detected.
    // Each sheet's text is capped individually so all tabs stay represented.
    const text = wb.SheetNames.map(sn =>
      '### ' + sn + '\n' + XLSX.utils.sheet_to_csv(wb.Sheets[sn]).slice(0, 35000)).join('\n\n').trim();
    return { text, sheets: [...wb.SheetNames] };
  }
  throw new Error('Unsupported file type');
}
async function addFiles(panel, fileList, optionId) {
  for (const f of fileList) {
    const rec = { id: uid(), name: f.name, size: f.size, status: 'busy', text: '', error: '',
      optionId: optionId || null,
      kind: /\.xlsx?$/i.test(f.name) ? 'XLSX' : 'PDF' };
    if (f.size > 20 * 1048576) { rec.status = 'err'; rec.error = 'Over 20 MB limit'; }
    if (state.files[panel].length >= 20) { alert('Maximum 20 files per panel.'); break; }
    state.files[panel].push(rec); state.seeded = false; save(); render();
    if (rec.status === 'err') continue;
    try {
      const onProgress = (p, n) => { rec.ocrMsg = `Scanned file — reading page ${p} of ${n}…`; save(); render(); };
      const { text, sheets, ocr } = await extractText(f, onProgress);
      rec.text = text.slice(0, 200000); // keep sessionStorage sane
      rec.chars = text.length;
      rec.sheets = sheets;              // authoritative building-tab list (XLSX)
      rec.ocr = !!ocr;                  // was this read via OCR?
      rec.ocrMsg = '';
      rec.status = 'ok';
    } catch (e) { rec.status = 'err'; rec.ocrMsg = ''; rec.error = (e && e.message) || 'Could not read file'; }
    save(); render();
  }
}
function removeFile(panel, id) {
  state.files[panel] = state.files[panel].filter(f => f.id !== id);
  state.seeded = false; save(); render();
}

/* ---------- Seeding: extracted text → editable structure ---------- */
function cleanName(fn) { return fn.replace(/\.(pdf|xlsx?|xls)$/i,'').replace(/[_-]+/g,' ').trim(); }
const esc = s => s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
function guessQuoteNo(text, fname) {
  // Explicit "quote number" label wins; then a 7–9 digit run in the filename
  // (e.g. "Proposal - 48517097 (R7,874.57).pdf"); then other labelled refs.
  // Never fall back to bare digit runs — those match VAT/Reg numbers.
  let m = /quote\s*(?:number|no\.?|#)?\s*[:#]?\s*(\d{5,12})/i.exec(text || '');
  if (m) return m[1];
  m = /(\d{7,9})/.exec(fname || ''); if (m) return m[1];
  m = /(?:quotation|proposal|ref(?:erence)?)\s*(?:number|no\.?)?\s*[:#]?\s*(\d{5,12})/i.exec(text || '');
  return m ? m[1] : '';
}
function guessInsurer(text, fname) {
  const hay = (fname + ' ' + (text || '')); // scan the full text, not a prefix
  for (const ins of INSURERS) if (new RegExp('\\b' + esc(ins) + '\\b','i').test(hay)) return ins;
  return '';
}
// The quotes panel holds Cartrack proposals, so the proposed insurer is
// Cartrack — with the underwriter appended when one is detected.
function proposedInsurer(text, fname) {
  const u = guessInsurer(text, fname);
  return u && !/cartrack/i.test(u) ? 'Cartrack · ' + u : 'Cartrack';
}
/* Building name from a schedule filename: strip leading dates, insurer and
   document words — "2026-03-01 Brett Park Office Park Bryte Renewal Policy
   Schedule.pdf" → "Brett Park Office Park". Lets the two-PDFs-per-building
   pattern (e.g. Bryte + AIG XOL) dedupe into one building. */
const DOC_WORDS = /\b(renewal|policy|schedule|proposal|quote|quotation|umbrella|liability|xol|commercial)\b/gi;
function buildingNameFromFile(fname) {
  let n = cleanName(fname);
  n = n.replace(/^\s*\d{4}[ .\/-]\d{1,2}[ .\/-]\d{1,2}\s*/, '');
  n = n.replace(new RegExp('\\b(' + INSURERS.map(esc).join('|') + ')\\b', 'gi'), '');
  n = n.replace(DOC_WORDS, '').replace(/\s{2,}/g, ' ').trim();
  return n || cleanName(fname);
}
/* When the filename is an opaque code (OT106190151…, BUILDINGMAINTENANCE0521),
   pull the name from inside the document: the insured-name block first, the
   risk address as fallback. */
function buildingNameFromText(text) {
  // PDF text arrives without line breaks, so the captured chunk is cut at a
  // natural entity suffix (Body Corporate, HOA, (Pty) Ltd) or a stop word.
  let m = /(?:policy\s*holder|the insured|insured name|name of insured)\s*[:\-]?\s+([^\n]{4,90})/i.exec(text || '');
  let raw = m ? m[1] : '';
  if (!raw) {
    m = /(?:risk address|situation address|situated at)\s*[:\-]?\s+([^\n]{4,90})/i.exec(text || '');
    raw = m ? m[1] : '';
  }
  if (!raw) return '';
  raw = raw.replace(/\s{2,}/g, ' ').trim();
  const suffix = /^(.*?\b(?:body corporate|home\s?owners association|hoa|\(pty\) ltd|proprietary limited|cc))\b/i.exec(raw);
  if (suffix) return suffix[1].trim();
  const stop = raw.search(/\b(for attention|attention|vat|physical|postal|suburb|town|province|company|registration|reg no|address)\b/i);
  if (stop > 3) return raw.slice(0, stop).trim();
  return raw.split(/\s+/).slice(0, 6).join(' ');
}
function looksLikeCode(name) {
  return name.split(/\s+/).length < 2 || /\d{5,}/.test(name);
}

/* ---------- figure pre-fill: parse premiums out of the documents ---------- */
const titleCase = s => s.toLowerCase().replace(/(^|[\s(\/&-])([a-z])/g, (m,a,b) => a + b.toUpperCase()).replace(/\bSasria\b/i,'SASRIA');
const fmtLimit = n => n == null ? '' : n >= 1e6 ? 'R ' + (n/1e6).toFixed(2) + 'M' : 'R ' + String(Math.round(n)).replace(/\B(?=(\d{3})+(?!\d))/g, ' ');

/* Proposal (quote PDF): "SUMMARY OF COVER … DESCRIPTION MONTHLY PREMIUM
   BUILDINGS COMBINED R1 876,23 … TOTAL PREMIUM: R7 874,57".
   SASRIA sub-rows are summed into one SASRIA line; ASSIST becomes fees. */
function parseProposalProp(text) {
  const start = /SUMMARY OF COVER/i.exec(text || '');
  if (!start) return { rows: [], total: null };
  const endM = /TOTAL PREMIUM\s*:?\s*R([\d ]+(?:,\d{2})?)/i.exec(text.slice(start.index));
  const region = text.slice(start.index, endM ? start.index + endM.index : start.index + 4000);
  const rows = []; const zeroSections = []; let sasria = 0, fees = 0;
  for (const m of region.matchAll(/([A-Z][A-Z &\/'()\-]{2,40}?)\s+R([\d ]+(?:,\d{2})?)/g)) {
    // Rows can arrive glued to preceding header text. Column gaps are runs of
    // 2+ spaces while names use single spaces — the name is the last segment.
    const name = m[1].trim().split(/\s{2,}/).pop().trim();
    if (!name || /SUMMARY|TOTAL|DESCRIPTION|COMMISSION|VAT/i.test(name)) continue;
    const amt = parseMoney(m[2]);
    if (amt == null) continue;
    if (amt === 0) { zeroSections.push(titleCase(name)); continue; } // listed at R0,00 = included at no premium
    if (/SASRIA/i.test(name)) { sasria += amt; continue; }
    if (/^ASSIST/i.test(name)) { fees += amt; continue; }
    rows.push({ s: titleCase(name), amt });
  }
  if (sasria) rows.push({ s: 'SASRIA', amt: +sasria.toFixed(2) });
  if (fees) rows.push({ s: 'Broker & assist fees', amt: +fees.toFixed(2) });
  return { rows, zeroSections, total: endM ? parseMoney(endM[1]) : null };
}

/* OUTsurance summary: "Fire* Yes R1,079.95 Buildings combined* Yes R6,343.71
   Office contents No Theft Yes R537.62 …" — each section is name + Yes/No +
   (premium when Yes). Plus a stated SASRIA and total. */
function parseScheduleOUT(text) {
  const start = /Fire\*?\s+(?:Yes|No)\b/i.exec(text || '');
  if (!start) return null;
  const region = text.slice(start.index, start.index + 2000);
  const rows = [];
  for (const m of region.matchAll(/([A-Za-z][A-Za-z ()\-\/&]*?)\*?\s+(Yes|No)\b(?:\s+R([\d,]+\.\d{2}))?/g)) {
    if (!/yes/i.test(m[2]) || !m[3]) continue;                 // only sections held, with a premium
    const name = m[1].replace(/^[a-z]+\s+/, '').trim();        // strip leading word fragment (e.g. "ium ")
    const amt = parseMoney(m[3]);
    if (!name || amt == null) continue;
    rows.push({ s: titleCase(name), amt, si: null });
  }
  let m = /SASRIA premium\s+R([\d,]+\.\d{2})/i.exec(text);
  if (m && parseMoney(m[1])) rows.push({ s: 'SASRIA', amt: parseMoney(m[1]) });
  m = /Total premium\s*\(Including VAT\)\s+R([\d,]+\.\d{2})/i.exec(text);
  return { rows, total: m ? parseMoney(m[1]) : null };
}
/* Schedule (e.g. Bryte): "PREMIUM SCHEDULE AND INDEX OF COVER … BUILDINGS
   COMBINED NO YES 2 351.10 R R - R 2 38 717 000 …", then Sasria / fees /
   additional-services and a stated TOTAL. Dispatches to OUTsurance when the
   Bryte-style index is absent. */
function parseScheduleCur(text) {
  const start = /PREMIUM SCHEDULE AND INDEX OF COVER/i.exec(text || '');
  if (!start) return parseScheduleOUT(text) || { rows: [], total: null };
  const region = text.slice(start.index, start.index + 6000);
  const rows = [];
  for (const m of region.matchAll(/([A-Z][A-Z &\/'()\-]{2,40}?)\s+(?:NO|YES)\s+YES\s+([\d ]+\.\d{2})(?:\s+R\s+R\s+-\s+R\s+\d+\s+([\d ]{3,15}?)(?=\s+[A-Z]))?/g)) {
    const name = m[1].trim();
    if (/SECTION|PREMIUM|TOTAL/i.test(name)) continue;
    const amt = parseMoney(m[2]);
    if (amt == null || amt === 0) continue;
    rows.push({ s: titleCase(name), amt, si: m[3] ? parseMoney(m[3]) : null });
  }
  let m = /Sasria\s*-\s*([\d ]+\.\d{2})/i.exec(region);
  if (m) rows.push({ s: 'SASRIA', amt: parseMoney(m[1]) });
  m = /([\d ]+\.\d{2})\s+Total Fees/i.exec(region);
  if (m && parseMoney(m[1])) rows.push({ s: 'Broker & assist fees', amt: parseMoney(m[1]) });
  m = /Additional Services[^\d]{0,40}?([\d ]+\.\d{2})/i.exec(region);
  if (m && parseMoney(m[1])) rows.push({ s: 'Additional services', amt: parseMoney(m[1]) });
  m = /TOTAL\s*-\s*([\d ]+\.\d{2})/.exec(region);
  return { rows, total: m ? parseMoney(m[1]) : null };
}

/* Merge current (schedules) and proposed (proposal) rows into comparison
   lines, keyed by normalised section name. Sections on only one side become
   visible gaps rather than disappearing. */
// Canonical cover-section name so equivalent sections from a schedule and a
// Cartrack quote merge into one comparison line instead of a false gap +
// false "now covered". Alias patterns run first; anything unmatched falls back
// to a cleaned token key.
const SECTION_ALIASES = [
  { canon: 'UMBRELLA LIABILITY', re: /umbrella/i },
  { canon: 'PUBLIC LIABILITY', re: /public liability|general liability/i },
  { canon: 'EMPLOYERS LIABILITY', re: /employ/i },
  { canon: 'BUILDINGS COMBINED', re: /buildings?\b/i },
  { canon: 'BUSINESS ALL RISKS', re: /all risks?|business all risk/i },
  { canon: 'ACCIDENTAL DAMAGE', re: /accidental/i },
  { canon: 'ELECTRONIC EQUIPMENT', re: /electronic/i },
  { canon: 'FIDELITY GUARANTEE', re: /fidelity/i },
  { canon: 'BUSINESS INTERRUPTION', re: /interruption/i },
  { canon: 'MACHINERY BREAKDOWN', re: /machinery/i },
  { canon: 'GOODS IN TRANSIT', re: /transit/i },
  { canon: 'OFFICE CONTENTS', re: /office contents|contents/i },
  { canon: 'POWER SURGE', re: /power surge/i },
  { canon: 'GEYSER', re: /geyser/i },
  { canon: 'GLASS', re: /\bglass\b/i },
  { canon: 'MONEY', re: /\bmoney\b/i },
  { canon: 'THEFT', re: /\btheft\b/i },
  { canon: 'GROUP PERSONAL ACCIDENT', re: /group personal accident|personal accident/i },
  { canon: 'TRUSTEES LIABILITY', re: /trustees?/i },
  { canon: 'BROKER & ASSIST FEES', re: /broker|assist|policy fee|admin fee|sundry/i },
  { canon: 'ADDITIONAL SERVICES', re: /additional services?/i },
  { canon: 'SASRIA', re: /sasria/i },
];
function canonSection(name) {
  const raw = String(name || '').trim();
  for (const a of SECTION_ALIASES) if (a.re.test(raw)) return a.canon;
  return raw.toUpperCase().replace(/\b(COMMERCIAL|POLICY|SECTION|COVER|INSURANCE)\b/g, '')
    .replace(/[^A-Z0-9]+/g, ' ').trim();
}
// Fold lines within one quote that resolve to the same canonical section
// (e.g. current "Commercial Umbrella Liability" + proposed "Umbrella Policy").
function mergeDuplicateSections(q) {
  const byKey = new Map(); const out = [];
  for (const l of q.lines) {
    const k = canonSection(l.s);
    const e = byKey.get(k);
    if (!e) { byKey.set(k, l); out.push(l); continue; }
    if (e.cur == null && !e.curIncl && l.cur != null) {
      e.cur = l.cur; e.curL = e.curL || l.curL; e.curIncl = l.curIncl; e.curStr = e.curStr === '—' ? (l.curStr || '') : e.curStr;
    }
    if (e.prop == null && !e.propIncl && !e.propNq && (l.prop != null || l.propIncl || l.propNq)) {
      e.prop = l.prop; e.propL = e.propL || l.propL; e.propIncl = l.propIncl; e.propNq = l.propNq; e.propStr = l.propNq ? 'Not quoted' : '';
    }
  }
  q.lines = out;
}
// Fill current-side figures into an existing quote's lines without touching
// the proposed side or any current value the RM already entered.
function backfillCurrent(q, curRows) {
  if (!curRows || !curRows.length) return;
  const byKey = new Map(q.lines.map(l => [canonSection(l.s), l]));
  for (const r of curRows) {
    const k = canonSection(r.s);
    const e = byKey.get(k);
    if (e) {
      if (e.cur == null && !e.curIncl) { e.cur = r.amt; if (r.si && !e.curL) e.curL = fmtLimit(r.si); if (e.curStr === '—') e.curStr = ''; }
    } else {
      const nl = { ...newLine(r.s), cur: r.amt, curL: r.si ? fmtLimit(r.si) : '' };
      q.lines.push(nl); byKey.set(k, nl);
    }
  }
}
function buildComparisonLines(curRows, prop) {
  const key = canonSection;
  const map = new Map();
  for (const r of curRows) {
    const k = key(r.s);
    const e = map.get(k) || { ...newLine(r.s), cur: 0 };
    e.cur = +((e.cur || 0) + r.amt).toFixed(2);
    if (r.si && !e.curL) e.curL = fmtLimit(r.si);
    map.set(k, e);
  }
  for (const r of prop.rows) {
    const k = key(r.s);
    const e = map.get(k);
    if (e) e.prop = +((e.prop || 0) + r.amt).toFixed(2);
    else map.set(k, { ...newLine(r.s), prop: r.amt, curStr: '—' });
  }
  // Sections the proposal lists at R0,00: included at no premium — a real
  // comparison point (saving) when the current policy charges for them.
  const zeroKeys = new Set((prop.zeroSections || []).map(key));
  for (const e of map.values()) {
    if (e.cur != null && e.prop == null) {
      if (zeroKeys.has(key(e.s))) { e.prop = 0; e.propL = 'Included'; }
      else e.propStr = 'Not quoted';
    }
  }
  return [...map.values()];
}
function riskAddressFromText(text) {
  const m = /risk address\s*[:\-]?\s+([^\n]{6,70}?)(?:\s+Page\b|\s{3,}|\n|$)/i.exec(text || '');
  return m ? m[1].replace(/\s{2,}/g,' ').trim() : '';
}
/* Score a quote's text+filename against each building name. Generic property
   words don't count; distinctive words score 2; a house/stand number that
   appears as a whole word scores 3 (disambiguates 43 vs 39 Empire Road). */
const GENERIC_WORDS = new Set(['body','corporate','homeowners','association','office','park','road','lane','street','drive','the','and','court','estate']);
function scoreBuilding(b, s, allowNumbers) {
  let sc = 0;
  for (const w of (b.name || '').toLowerCase().split(/\s+/)) {
    if (!w || GENERIC_WORDS.has(w)) continue;
    if (/^\d{2,4}$/.test(w)) {
      // Street/stand numbers only count in focus windows — in full text they
      // collide with page numbers and totals.
      if (allowNumbers && new RegExp('\\b' + w + '\\b').test(s)) sc += 3;
    }
    else if (/^\d/.test(w)) continue;               // lone digits / codes: too weak to score
    else if (w.length >= 3 && s.includes(w)) sc += 2;
  }
  return sc;
}
function matchBuilding(hayRaw) {
  const hay = hayRaw.toLowerCase();
  // Every proposal repeats the broker's own header address, which can point at
  // the wrong building — so text near risk-address and policyholder markers is
  // what gets scored heavily (and is the only place numbers count).
  let focus = '';
  for (const m of hay.matchAll(/risk address|situation address|premises|property insured|situated at|risk details|physical address of prop|policy\s*holder|the insured|insured name|name of insured/g)) {
    focus += hay.slice(m.index, m.index + 400) + ' ';
  }
  let best = null, bs = 0;
  for (const b of state.buildings) {
    const s = (focus ? scoreBuilding(b, focus, true) * 3 : 0) + scoreBuilding(b, hay, false);
    if (s > bs) { bs = s; best = b; }
  }
  return bs > 0 ? best : null;
}
function newLine(s='') { return { id: uid(), s, curL: '', cur: null, curStr: '', propL: '', prop: null, propStr: '', propNq: false, curIncl: false, propIncl: false }; }
function newBuilding(name) { return { id: uid(), name: name || 'Building ' + (state.buildings.length+1), entity: '', addr: '', si: '', selQ: null }; }
function newQuote(buildingId, insurer='', quoteNo='') {
  return { id: uid(), buildingId, insurer, quoteNo, note: '', advisories: '', lines: [] };
}
/* ---------- Fleet / motor policies (vehicles, not buildings) ---------- */
// A motor-fleet quote/schedule has vehicles, fleet values and motor premiums —
// none of the property cover sections the normal parser looks for. Detect it and
// read the premium totals instead.
function looksLikeFleet(text) {
  if (!text) return false;
  // Strong, fleet-ONLY phrases. Generic words like "motor"/"vehicle"/"comprehensive"
  // also appear in property policies, so they are deliberately excluded — otherwise a
  // property portfolio gets mis-read as a single vehicle fleet.
  return /total fleet value|number of vehicles|fleetb(?:ü|u)ddy|private vehicles fleet|types of vehicle\s*\(sasria|unspecified vehicles/i.test(text);
}
const _fnum = s => parseFloat(String(s).replace(/[R\s,]/g, '')) || 0;
// Parse a proposed fleet quote into comparison sections (per-fleet + SASRIA + fees),
// with a balancing line so the sections always reconcile to the stated grand total.
function parseFleetSections(text) {
  const first = re => { const m = re.exec(text); return m ? _fnum(m[1]) : null; };
  const fleets = [];
  const re = /Item\s+(\d+)\s*[-–]\s*([A-Za-z][A-Za-z0-9 ]*?)\s+(\d+)\s+Sum Insured\s*R([\d ,]+)[\s\S]{0,180}?Total Premium\s*R([\d ,]+\.\d{2})/g;
  let m; while ((m = re.exec(text))) fleets.push({ name: m[2].trim(), count: +m[3], prem: _fnum(m[5]) });
  const cover = first(/Cover Sub-?Total\s*R([\d ,]+\.\d{2})/i);
  const sasria = first(/Sasria Sub-?Total\s*R([\d ,]+\.\d{2})/i);
  const fees = first(/(?:Broker Fee|Fee Sub-?Total)\s*R([\d ,]+\.\d{2})/i);
  const grand = first(/Cover Sub-?Total\s*R[\d ,]+\.\d{2}\s*Premium\s*R([\d ,]+\.\d{2})/i);
  const sumF = fleets.reduce((s, f) => s + f.prem, 0);
  const secs = fleets.map(f => ({ s: f.name + ' (' + f.count + ' vehicles)', prop: +f.prem }));
  if (cover && cover - sumF > 1) secs.push({ s: 'Other vehicle cover', prop: +(cover - sumF).toFixed(2) });
  if (sasria) secs.push({ s: 'SASRIA', prop: sasria });
  if (fees) secs.push({ s: 'Broker / admin fee', prop: fees });
  if (!secs.length && grand) secs.push({ s: 'Motor & vehicle cover', prop: grand });
  return { secs, grand: grand || (sumF + (sasria || 0) + (fees || 0)) };
}
// Best-effort single current premium off a (possibly OCR'd) schedule.
function parseFleetCurTotal(text) {
  const cands = [...(text || '').matchAll(/(?:total premium|monthly premium|premium payable|total monthly|premium due)[^R\d]{0,14}R?\s?([\d][\d ,]{2,}\.\d{2})/gi)]
    .map(m => _fnum(m[1])).filter(v => v > 100);
  return cands.length ? Math.max(...cands) : null;
}
function fleetSeed() {
  const qFiles = state.files.quote.filter(f => f.status === 'ok');
  const fleetFiles = qFiles.filter(f => looksLikeFleet(f.text));
  if (!fleetFiles.length) return false;
  // Only hijack the property flow if we can genuinely parse a fleet structure
  // (real fleet items + a reconciling total) from a proposal.
  if (!fleetFiles.some(f => { const p = parseFleetSections(f.text); return p.secs.length >= 1 && p.grand > 0; })) return false;
  if (state.buildings.some(b => b.__fleet)) return true; // already fleet-seeded
  const client = (state.client.name || '').trim();
  if (!state.buildings.length) state.buildings.push(newBuilding(client ? (client + ' — vehicle fleet') : 'Vehicle fleet'));
  const bld = state.buildings[0]; bld.__fleet = true;
  let curTotal = null;
  for (const f of state.files.schedule) { if (f.status !== 'ok') continue; const c = parseFleetCurTotal(f.text); if (c) curTotal = Math.max(curTotal || 0, c); }
  const multiOpt = (state.options || []).length > 1;
  qFiles.forEach(f => {
    const opt = (state.options || []).find(o => o.id === f.optionId);
    const insurer = (multiOpt && opt && opt.insurer.trim()) ? opt.insurer.trim() : proposedInsurer(f.text, f.name);
    const parsed = parseFleetSections(f.text);
    const q = newQuote(bld.id, insurer, guessQuoteNo(f.text, f.name));
    q.optionId = f.optionId || (state.options[0] && state.options[0].id);
    q.srcId = f.id;
    q.lines = [];
    // Always give the RM a clear place for the client's current premium (pre-filled
    // if the schedule stated it; blank for them to type otherwise).
    q.lines.push({ id: uid(), s: 'Current fleet premium (as billed)', curL: '', cur: curTotal, propL: '', prop: null, propNq: true, curStr: '', propStr: 'n/a' });
    parsed.secs.forEach(s => q.lines.push({ id: uid(), s: s.s, curL: '', cur: null, propL: '', prop: s.prop, curStr: '', propStr: '' }));
    state.quotes.push(q);
  });
  state.seeded = true; save();
  return true;
}

function seedFromFiles() {
  if (fleetSeed()) return; // motor-fleet policies use a separate reader
  // Buildings: one per XLSX sheet, or one per distinct schedule-PDF building
  // name (two schedules for the same building — e.g. Bryte + AIG — dedupe).
  if (!state.buildings.length) {
    const seen = new Set();
    const addB = (name) => {
      const key = name.toLowerCase().replace(/\s+/g, ' ').trim();
      if (!key || seen.has(key)) return;
      seen.add(key); state.buildings.push(newBuilding(name));
    };
    for (const f of state.files.schedule) {
      if (f.status !== 'ok') continue;
      if (f.kind === 'XLSX') {
        // Prefer the workbook's own sheet list; fall back to text markers for
        // files read before this field existed.
        const sheets = f.sheets && f.sheets.length ? f.sheets
          : [...(f.text.matchAll(/^### (.+)$/gm))].map(m => m[1].trim());
        for (const s of sheets) addB(s);
      } else {
        let nm = buildingNameFromFile(f.name);
        if (looksLikeCode(nm)) nm = buildingNameFromText(f.text) || nm;
        addB(nm);
      }
    }
    if (!state.buildings.length) state.buildings.push(newBuilding('Building 1'));
  }
  // Map each schedule file to its building (by derived name, else by match)
  const normKey = s => (s || '').toLowerCase().replace(/\s+/g, ' ').trim();
  const schedByB = new Map();
  for (const f of state.files.schedule) {
    if (f.status !== 'ok' || f.kind === 'XLSX') continue;
    let nm = buildingNameFromFile(f.name);
    if (looksLikeCode(nm)) nm = buildingNameFromText(f.text) || nm;
    const b = state.buildings.find(x => normKey(x.name) === normKey(nm))
      || matchBuilding(nm + ' ' + (f.text || '').slice(0, 3000));
    if (!b) continue;
    if (!schedByB.has(b.id)) schedByB.set(b.id, []);
    schedByB.get(b.id).push(f);
  }
  // Pre-fill building meta + current-side figures from its schedules
  for (const b of state.buildings) {
    const curRows = [];
    for (const f of schedByB.get(b.id) || []) {
      const parsed = parseScheduleCur(f.text);
      curRows.push(...parsed.rows);
      const bc = parsed.rows.find(r => /BUILDINGS/i.test(r.s) && r.si);
      if (bc && !b.si) b.si = fmtLimit(bc.si);
      if (!b.entity) { const e = buildingNameFromText(f.text); if (e && normKey(e) !== normKey(b.name)) b.entity = e; }
    }
    b.__curRows = curRows; // transient, used below
  }
  // Quotes: one per quote-panel file, scored against building names; lines
  // pre-filled by merging schedule (current) and proposal (proposed) figures.
  const existingBySrc = new Map(state.quotes.map(q => [q.srcId, q]));
  // When the RM declared multiple options, each option carries its own insurer
  // name and each file is tagged to an option — so the report can show them
  // side by side, headed by the insurer the RM named.
  const multiOpt = (state.options || []).length > 1;
  const optOf = f => (state.options || []).find(o => o.id === f.optionId);
  const insurerFor = f => { const o = optOf(f); return (multiOpt && o && o.insurer && o.insurer.trim()) ? o.insurer.trim() : proposedInsurer(f.text, f.name); };
  const optIdFor = f => f.optionId || (state.options && state.options[0] && state.options[0].id) || null;
  for (const f of state.files.quote) {
    if (f.status !== 'ok') continue;
    const existing = existingBySrc.get(f.id);
    // Rebrand a bare underwriter name (e.g. "Western") — keep anything already branded.
    if (existing && (!existing.insurer || !/cartrack/i.test(existing.insurer) || multiOpt))
      existing.insurer = insurerFor(f);
    if (existing && !existing.optionId) existing.optionId = optIdFor(f);
    const bldExisting = existing ? state.buildings.find(x => x.id === existing.buildingId) : null;
    if (existing && existing.lines.length) {
      backfillCurrent(existing, (bldExisting && bldExisting.__curRows) || []);  // fill newly-parsed current figures
      continue;                                          // keep RM-entered data otherwise
    }
    const bld = bldExisting || matchBuilding(f.name + ' ' + (f.text || '')) || state.buildings[0];
    const prop = parseProposalProp(f.text);
    const q = existing || newQuote(bld.id, insurerFor(f), guessQuoteNo(f.text, f.name));
    q.optionId = optIdFor(f);
    q.lines = buildComparisonLines(bld.__curRows || [], prop);
    q.totalStated = prop.total;
    if (!bld.addr) { const a = riskAddressFromText(f.text); if (a) bld.addr = a; }
    if (!existing) { q.srcId = f.id; state.quotes.push(q); }
  }
  for (const b of state.buildings) delete b.__curRows;
  for (const q of state.quotes) mergeDuplicateSections(q);  // fold equivalent sections
  state.seeded = true; save();
}

/* ---------- Header ---------- */
function renderHeader() {
  const stepsEl = $('#steps'); stepsEl.innerHTML = '';
  STEPS.forEach((s, i) => {
    stepsEl.append(el('button', {
      class: 'step', 'aria-current': String(state.step === s.id),
      onClick: () => { go(s.id); },
    }, el('span', { class: 'n' }, String(i+1).padStart(2,'0')), s.label));
  });
  const sel = $('#rmSelect'); sel.innerHTML = '';
  RMS.forEach(r => sel.append(el('option', { value: r.id, selected: r.id === state.rmId }, r.name)));
  sel.onchange = () => { state.rmId = sel.value; save(); syncRm(); if (state.step === 'report') render(); };
  syncRm();
}
function syncRm() {
  const rm = RMS.find(r => r.id === state.rmId) || RMS[0];
  $('#rmAv').textContent = rm.initials; $('#rmRole').textContent = rm.role;
}
function go(step) {
  if (step === 'review' && !state.seeded) seedFromFiles();
  state.step = step; save(); render();

/* ---------- multi-option (side-by-side) comparison ---------- */
const secKey = s => (s || '').toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();
// All proposal-quotes for a building that have lines, in the RM's option order.
function optionQuotes(b) {
  const order = new Map((state.options || []).map((o, i) => [o.id, i]));
  return quotesOf(b).filter(q => q.lines && q.lines.length)
    .sort((a, c) => (order.has(a.optionId) ? order.get(a.optionId) : 99) - (order.has(c.optionId) ? order.get(c.optionId) : 99));
}
function isMultiOption() { return state.buildings.some(b => optionQuotes(b).length > 1); }
// Ordered union of cover sections across a building's options.
function sectionUnion(opts) {
  const out = [], seen = new Set();
  opts.forEach(q => q.lines.forEach(l => { const k = secKey(l.s); if (k && !seen.has(k)) { seen.add(k); out.push({ key: k, label: l.s }); } }));
  return out;
}
function curCellFor(opts, key) {
  for (const q of opts) { const l = q.lines.find(x => secKey(x.s) === key); if (l && (l.cur != null || l.curL || l.curStr || l.curIncl)) return l; }
  return null;
}
// Portfolio totals per option + the recommended (lowest-premium) option id.
function optionPortfolio() {
  const order = new Map((state.options || []).map((o, i) => [o.id, i]));
  const map = new Map();
  let cur = 0;
  for (const b of state.buildings) {
    const opts = optionQuotes(b); if (!opts.length) continue;
    sectionUnion(opts).forEach(sec => { const l = curCellFor(opts, sec.key); if (l && l.cur != null) cur += l.cur; });
    for (const q of opts) {
      const key = q.optionId || q.id, t = quoteTotals(q);
      const e = map.get(key) || { key, insurer: q.insurer || 'Cartrack', prop: 0, ord: order.has(q.optionId) ? order.get(q.optionId) : 99 };
      e.prop += t.prop;
      if (!e.insurer || /^cartrack$/i.test(e.insurer)) e.insurer = q.insurer || e.insurer;
      map.set(key, e);
    }
  }
  const options = [...map.values()].sort((a, b) => a.ord - b.ord);
  const rec = options.reduce((m, e) => (m == null || e.prop < m.prop) ? e : m, null);
  return { options, cur, recId: rec ? rec.key : null };
}

    let best = null;
    cells.forEach(l => { if (l && !l.propNq && !l.propIncl && l.prop != null) { if (best == null || l.prop < best) best = l.prop; } });
    const anyQuoted = cells.some(l => l && !l.propNq && (l.prop != null || l.propIncl));

  });
  const totals = opts.map(q => quoteTotals(q));
  const curTotal = rows.reduce((s, r) => s + (r.curL && r.curL.cur != null ? r.curL.cur : 0), 0);
  const bestTotal = Math.min(...totals.map(t => t.prop));
  const propCell = (l, isBest, isGap) => {
    let txt = '—';
    if (l) txt = l.propNq ? 'Not quoted' : l.prop == null ? (l.propStr || '—') : l.propIncl ? 'Included' : fmtR(l.prop);
